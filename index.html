<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kundali Analyzer · PyJHora</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #f3f4f6;
            padding: 2rem 1rem;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            color: white;
            padding: 2rem;
            text-align: center;
        }
        .header h1 { font-size: 2.5rem; font-weight: 700; }
        .header p { opacity: 0.9; margin-top: 0.5rem; }
        .main { padding: 2rem; }
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            background: #f9fafb;
            border-radius: 1.5rem;
            padding: 2rem;
            margin-bottom: 2rem;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .form-group label {
            font-weight: 600;
            font-size: 0.875rem;
            color: #4b5563;
        }
        .form-group input {
            padding: 0.75rem 1rem;
            border: 2px solid #e5e7eb;
            border-radius: 1rem;
            font-size: 1rem;
            transition: 0.2s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #7c3aed;
            box-shadow: 0 0 0 3px rgba(124,58,237,0.1);
        }
        .form-actions {
            grid-column: 1 / -1;
            display: flex;
            gap: 1rem;
        }
        .btn {
            padding: 0.75rem 2rem;
            border: none;
            border-radius: 9999px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            background: white;
            border: 2px solid #e5e7eb;
        }
        .btn-primary {
            background: #7c3aed;
            border-color: #7c3aed;
            color: white;
        }
        .btn-primary:hover {
            background: #6d28d9;
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(124,58,237,0.4);
        }
        .results {
            display: none;
            margin-top: 2rem;
        }
        .card {
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 1.5rem;
            padding: 1.5rem;
        }
        .card-title {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th {
            text-align: left;
            padding: 0.75rem;
            background: #f3f4f6;
        }
        td {
            padding: 0.75rem;
            border-bottom: 1px solid #e5e7eb;
        }
        .planet-badge {
            background: #ede9fe;
            color: #6d28d9;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.875rem;
            display: inline-block;
            margin: 0.125rem;
        }
        .panchanga-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px,1fr));
            gap: 1rem;
        }
        .panchanga-item {
            background: #f9fafb;
            border-radius: 1rem;
            padding: 1rem;
            text-align: center;
        }
        .panchanga-item .label {
            font-size: 0.75rem;
            color: #6b7280;
            text-transform: uppercase;
        }
        .panchanga-item .value {
            font-size: 1.25rem;
            font-weight: 700;
            color: #1f2937;
        }
        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: #1f2937;
            color: white;
            padding: 1rem 2rem;
            border-radius: 9999px;
            transform: translateY(200%);
            transition: transform 0.3s;
        }
        .toast.show { transform: translateY(0); }
        .loading {
            display: none;
            text-align: center;
            padding: 2rem;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #7c3aed;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        footer {
            text-align: center;
            padding: 2rem;
            color: #6b7280;
            border-top: 1px solid #e5e7eb;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>✨ Kundali Analyzer</h1>
            <p>PyJHora · Swiss Ephemeris · 100% Accurate</p>
        </div>
        <div class="main">
            <form id="birthForm">
                <div class="form-grid">
                    <div class="form-group"><label>Date</label><input type="date" id="dob" required value="1996-07-04"></div>
                    <div class="form-group"><label>Time (HH:MM:SS)</label><input type="time" id="time" step="1" required value="09:10:00"></div>
                    <div class="form-group"><label>Latitude</label><input type="number" step="any" id="lat" required value="18.404"></div>
                    <div class="form-group"><label>Longitude</label><input type="number" step="any" id="lon" required value="75.195"></div>
                    <div class="form-group"><label>Timezone (UTC offset)</label><input type="number" step="any" id="tz" required value="5.5"></div>
                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary" id="submitBtn">Calculate Chart</button>
                    </div>
                </div>
            </form>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Calculating with Swiss Ephemeris...</p>
            </div>

            <div class="results" id="results">
                <div class="card">
                    <div class="card-title">🏠 Rasi Chart (Planets in Houses)</div>
                    <table id="planetTable">
                        <thead><tr><th>Planet</th><th>Longitude</th><th>Sign</th><th>House</th></tr></thead>
                        <tbody id="planetBody"></tbody>
                    </table>
                </div>

                <div class="card" style="margin-top:1.5rem;">
                    <div class="card-title">📅 Panchanga</div>
                    <div class="panchanga-grid" id="panchangaGrid"></div>
                </div>
            </div>

            <div id="errorToast" class="toast"></div>
        </div>
        <footer>Powered by PyJHora · Open Source · Free</footer>
    </div>

    <script>
        const API_BASE = 'https://codewander-666-bramha-ai.hf.space'; // Replace with your Space URL

        const form = document.getElementById('birthForm');
        const submitBtn = document.getElementById('submitBtn');
        const loading = document.getElementById('loading');
        const results = document.getElementById('results');
        const planetBody = document.getElementById('planetBody');
        const panchangaGrid = document.getElementById('panchangaGrid');
        const errorToast = document.getElementById('errorToast');

        function showToast(msg, isError = true) {
            errorToast.textContent = msg;
            errorToast.style.backgroundColor = isError ? '#ef4444' : '#10b981';
            errorToast.classList.add('show');
            setTimeout(() => errorToast.classList.remove('show'), 4000);
        }

        function setLoading(state) {
            submitBtn.disabled = state;
            loading.style.display = state ? 'block' : 'none';
            results.style.display = state ? 'none' : 'block';
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const dob = document.getElementById('dob').value.split('-');
            const time = document.getElementById('time').value.split(':');
            const payload = {
                year: parseInt(dob[0]),
                month: parseInt(dob[1]),
                day: parseInt(dob[2]),
                hour: parseInt(time[0]),
                minute: parseInt(time[1]),
                second: time[2] ? parseInt(time[2]) : 0,
                latitude: parseFloat(document.getElementById('lat').value),
                longitude: parseFloat(document.getElementById('lon').value),
                timezone: parseFloat(document.getElementById('tz').value)
            };

            setLoading(true);
            try {
                const res = await fetch(`${API_BASE}/calculate`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'Server error');
                renderResults(data);
            } catch (err) {
                showToast(err.message);
                setLoading(false);
            }
        });

        function renderResults(data) {
            // Planets
            let planetHtml = '';
            if (data.planet_positions) {
                data.planet_positions.forEach(p => {
                    planetHtml += `<tr><td>${p.name}</td><td>${p.longitude.toFixed(2)}°</td><td>${p.sign}</td><td>${p.house}</td></tr>`;
                });
            }
            planetBody.innerHTML = planetHtml || '<tr><td colspan="4">No data</td></tr>';

            // Panchanga
            if (data.panchanga) {
                const p = data.panchanga;
                panchangaGrid.innerHTML = `
                    <div class="panchanga-item"><div class="label">Tithi</div><div class="value">${p.tithi}</div></div>
                    <div class="panchanga-item"><div class="label">Nakshatra</div><div class="value">${p.nakshatra}</div></div>
                    <div class="panchanga-item"><div class="label">Yoga</div><div class="value">${p.yoga}</div></div>
                    <div class="panchanga-item"><div class="label">Karana</div><div class="value">${p.karana}</div></div>
                    <div class="panchanga-item"><div class="label">Vaara</div><div class="value">${p.vaara}</div></div>
                `;
            }

            setLoading(false);
        }
    </script>
</body>
</html>
