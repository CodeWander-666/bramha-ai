<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Panchanga · Hinglish</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 2rem 1rem;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }
        .header {
            background: rgba(255, 255, 255, 0.1);
            padding: 2rem;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }
        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }
        .header p {
            color: #4a5568;
            font-size: 1.1rem;
        }
        .header .badge {
            display: inline-block;
            background: #48bb78;
            color: white;
            padding: 0.25rem 1rem;
            border-radius: 9999px;
            font-size: 0.875rem;
            margin-top: 1rem;
        }
        .main {
            padding: 2rem;
        }
        .api-status {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            background: #f7fafc;
            border-radius: 1rem;
            padding: 1rem 1.5rem;
            margin-bottom: 2rem;
            border: 1px solid #e2e8f0;
        }
        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #48bb78;
            box-shadow: 0 0 0 2px rgba(72, 187, 120, 0.2);
        }
        .status-dot.error {
            background: #f56565;
            box-shadow: 0 0 0 2px rgba(245, 101, 101, 0.2);
        }
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            background: #f7fafc;
            border-radius: 1.5rem;
            padding: 2rem;
            margin-bottom: 2rem;
            border: 1px solid #e2e8f0;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .form-group.full-width {
            grid-column: 1 / -1;
            position: relative;
        }
        .form-group label {
            font-weight: 600;
            font-size: 0.875rem;
            color: #4a5568;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .form-group input {
            padding: 0.75rem 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 1rem;
            font-size: 1rem;
            transition: all 0.2s;
            background: white;
        }
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        /* Hidden coordinate fields */
        .hidden-coord {
            display: none;
        }
        #suggestions {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 0.5rem;
            max-height: 200px;
            overflow-y: auto;
            display: none;
            z-index: 1000;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }
        #suggestions div {
            padding: 0.75rem 1rem;
            cursor: pointer;
        }
        #suggestions div:hover {
            background: #f7fafc;
        }
        .form-actions {
            grid-column: 1 / -1;
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
        }
        .btn {
            padding: 0.75rem 2rem;
            border: none;
            border-radius: 9999px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: white;
            border: 2px solid #e2e8f0;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            color: white;
            flex: 1;
            justify-content: center;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(102, 126, 234, 0.5);
        }
        .loading-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(4px);
            align-items: center;
            justify-content: center;
            z-index: 1000;
            flex-direction: column;
            gap: 1rem;
        }
        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 5px solid #e5e7eb;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .result-container {
            background: #f7fafc;
            border-radius: 1.5rem;
            padding: 2rem;
            border: 1px solid #e2e8f0;
            white-space: pre-wrap;
            line-height: 1.8;
            font-size: 1rem;
            color: #2d3748;
        }
        .result-placeholder {
            color: #a0aec0;
            text-align: center;
            font-style: italic;
        }
        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: #2d3748;
            color: white;
            padding: 1rem 2rem;
            border-radius: 9999px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            transform: translateY(200%);
            transition: transform 0.3s;
            z-index: 1100;
        }
        .toast.show {
            transform: translateY(0);
        }
        footer {
            text-align: center;
            padding: 2rem;
            color: #718096;
            border-top: 1px solid #e2e8f0;
        }
        @media (max-width: 640px) {
            .form-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 AI Panchanga</h1>
            <p>Zhipu AI · PyJHora · Swiss Ephemeris</p>
            <span class="badge"><i class="fas fa-magic"></i> Hinglish mein</span>
        </div>
        <div class="main">
            <!-- API Status -->
            <div class="api-status" id="apiStatus">
                <span class="status-dot" id="statusDot"></span>
                <span id="statusText">Checking API connection...</span>
            </div>

            <!-- Simplified Form -->
            <form id="panchangaForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label><i class="far fa-calendar-alt"></i> Date</label>
                        <input type="date" id="dob" required value="1996-07-04">
                    </div>
                    <div class="form-group">
                        <label><i class="far fa-clock"></i> Time (HH:MM:SS)</label>
                        <input type="time" id="time" step="1" required value="09:10:00">
                    </div>
                    <div class="form-group full-width">
                        <label><i class="fas fa-search-location"></i> Location (start typing)</label>
                        <input type="text" id="locationInput" placeholder="e.g., New York, NY" autocomplete="off">
                        <div id="suggestions"></div>
                    </div>
                    <!-- Hidden coordinate fields (filled by autocomplete) -->
                    <input type="hidden" id="lat" value="18.404">
                    <input type="hidden" id="lon" value="75.195">
                    <input type="hidden" id="tz" value="5.5">

                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary" id="submitBtn">
                            <i class="fas fa-robot"></i> AI Panchanga Analysis
                        </button>
                    </div>
                </div>
            </form>

            <!-- Loading Overlay -->
            <div class="loading-overlay" id="loading">
                <div class="loading-spinner"></div>
                <p>Zhipu AI soch raha hai... thoda intezaar karo</p>
            </div>

            <!-- Result Area -->
            <div id="resultContainer" class="result-container result-placeholder">
                Yahan aapka AI panchanga analysis aayega...
            </div>

            <!-- Toast -->
            <div id="toast" class="toast"></div>
        </div>
        <footer>
            <i class="fas fa-star"></i> Powered by PyJHora · Zhipu AI · Open Source
        </footer>
    </div>

    <script>
        (function() {
            // --- Configuration ---
            const API_BASE = 'https://codewander-666-bramha-ai.hf.space'; // Your Hugging Face Space URL

            // --- DOM Elements ---
            const apiStatus = document.getElementById('apiStatus');
            const statusDot = document.getElementById('statusDot');
            const statusText = document.getElementById('statusText');
            const form = document.getElementById('panchangaForm');
            const submitBtn = document.getElementById('submitBtn');
            const loading = document.getElementById('loading');
            const resultContainer = document.getElementById('resultContainer');
            const locationInput = document.getElementById('locationInput');
            const suggestionsDiv = document.getElementById('suggestions');
            const latInput = document.getElementById('lat');
            const lonInput = document.getElementById('lon');
            const tzInput = document.getElementById('tz');
            const toast = document.getElementById('toast');

            // --- Utility Functions ---
            function showToast(message, isError = false) {
                toast.textContent = message;
                toast.style.backgroundColor = isError ? '#f56565' : '#48bb78';
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 4000);
            }

            function setLoading(state) {
                submitBtn.disabled = state;
                loading.style.display = state ? 'flex' : 'none';
            }

            // --- API Health Check ---
            async function checkHealth() {
                try {
                    const res = await fetch(`${API_BASE}/health`);
                    if (res.ok) {
                        const data = await res.json();
                        statusDot.className = 'status-dot';
                        statusText.textContent = `API connected · PyJHora ${data.jhora_available ? 'ready' : 'mock'} · Zhipu ${data.zhipu_available ? 'ready' : 'unavailable'}`;
                        if (!data.zhipu_available) {
                            showToast('Zhipu AI not configured – analysis may fail', true);
                        }
                    } else {
                        throw new Error('Health check failed');
                    }
                } catch {
                    statusDot.className = 'status-dot error';
                    statusText.textContent = 'API unreachable';
                }
            }
            checkHealth();

            // --- Location Autocomplete (Nominatim) ---
            let debounceTimer;
            locationInput.addEventListener('input', function() {
                clearTimeout(debounceTimer);
                const query = this.value.trim();
                if (query.length < 3) {
                    suggestionsDiv.style.display = 'none';
                    return;
                }
                debounceTimer = setTimeout(() => {
                    fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=5`)
                        .then(response => response.json())
                        .then(data => {
                            if (data.length === 0) {
                                suggestionsDiv.style.display = 'none';
                                return;
                            }
                            suggestionsDiv.innerHTML = data.map(place => 
                                `<div data-lat="${place.lat}" data-lon="${place.lon}" data-display="${place.display_name}">${place.display_name}</div>`
                            ).join('');
                            suggestionsDiv.style.display = 'block';
                        })
                        .catch(err => {
                            console.warn('Nominatim error:', err);
                            suggestionsDiv.style.display = 'none';
                        });
                }, 500);
            });

            suggestionsDiv.addEventListener('click', (e) => {
                const target = e.target.closest('div');
                if (!target) return;
                const lat = target.dataset.lat;
                const lon = target.dataset.lon;
                const display = target.dataset.display;
                latInput.value = parseFloat(lat).toFixed(4);
                lonInput.value = parseFloat(lon).toFixed(4);
                locationInput.value = display;
                suggestionsDiv.style.display = 'none';
                // For simplicity, we'll assume UTC offset based on coordinates; you might need a timezone API.
                // Here we just keep the default or user can override if needed. For a real app, use a timezone service.
                // We'll set a placeholder timezone; you can enhance by calling a timezone API.
                tzInput.value = "5.5"; // This is just a default; you may want to compute from lat/lon.
            });

            document.addEventListener('click', (e) => {
                if (!locationInput.contains(e.target) && !suggestionsDiv.contains(e.target)) {
                    suggestionsDiv.style.display = 'none';
                }
            });

            // --- Form Submission ---
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                const dob = document.getElementById('dob').value.split('-');
                const time = document.getElementById('time').value.split(':');
                const payload = {
                    year: parseInt(dob[0]),
                    month: parseInt(dob[1]),
                    day: parseInt(dob[2]),
                    hour: parseInt(time[0]),
                    minute: parseInt(time[1]),
                    second: time[2] ? parseInt(time[2]) : 0,
                    latitude: parseFloat(latInput.value),
                    longitude: parseFloat(lonInput.value),
                    timezone: parseFloat(tzInput.value)
                };

                setLoading(true);
                try {
                    const response = await fetch(`${API_BASE}/panchanga/analysis`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    const data = await response.json();
                    if (!response.ok) throw new Error(data.error || `HTTP ${response.status}`);

                    // Format the output nicely
                    let output = `📍 **स्थान:** ${locationInput.value || 'Unknown'}\n`;
                    output += `📅 **तिथि:** ${payload.year}-${payload.month}-${payload.day} ${payload.hour}:${payload.minute}:${payload.second}\n`;
                    output += `⏱️ **समय क्षेत्र:** UTC ${payload.timezone}\n\n`;
                    output += `🤖 **ज़िपु AI का विश्लेषण:**\n`;
                    output += `━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n`;
                    output += data.analysis || 'कोई विश्लेषण उपलब्ध नहीं है।';
                    
                    resultContainer.innerHTML = output.replace(/\n/g, '<br>');
                    resultContainer.classList.remove('result-placeholder');
                } catch (err) {
                    showToast('Error: ' + err.message, true);
                    resultContainer.innerHTML = '❌ विश्लेषण प्राप्त करने में त्रुटि हुई। कृपया पुनः प्रयास करें।';
                    resultContainer.classList.remove('result-placeholder');
                } finally {
                    setLoading(false);
                }
            });
        })();
    </script>
</body>
</html>
